{% extends "base.html" %}

{% block content %}
<section>
    <h2>Decks</h2>
    <form action="/decks/create" method="post" class="stack-form">
        <input type="text" name="name" placeholder="Deck name" required>
        <input type="text" name="format_name" placeholder="Format">
        <textarea name="notes" placeholder="Notes"></textarea>
        <button type="submit">Create Deck</button>
    </form>
</section>

<section>
    {% if decks %}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Format</th>
                <th>Cards</th>
                <th>View</th>
            </tr>
        </thead>
        <tbody>
            {% for deck in decks %}
            <tr>
                <td>{{ deck.id }}</td>
                <td>{{ deck.name }}</td>
                <td>{{ deck.format or '-' }}</td>
                <td>{{ deck.items|length }}</td>
                <td><a href="/decks/{{ deck.id }}">Open</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p>No decks yet.</p>
    {% endif %}
</section>
{% endblock %}
