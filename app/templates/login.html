{% extends "base.html" %}
{% block content %}
  <div style="max-width: 400px; margin: 3rem auto;">
    <section class="panel">
      <div class="eyebrow" style="margin-bottom: 0.5rem;">Mana Archive</div>
      <h2 class="panel-title" style="margin-bottom: 1.25rem;">Sign In</h2>
      {% if error %}<p style="color: #b45309; font-weight: 600; margin: 0 0 1rem;">{{ error }}</p>{% endif %}
      <form method="post" action="/login" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label>Email</label>
        <input name="username" type="email" required autofocus autocomplete="email">
        <label>Password</label>
        <input name="password"
               type="password"
               required
               autocomplete="current-password">
        <button type="submit" style="margin-top: 0.5rem;">Sign In</button>
      </form>
      <p class="muted small-text" style="margin-top: 1rem;">
        Don't have an account? <a href="/register">Create one</a>
      </p>
    </section>
  </div>
{% endblock %}
