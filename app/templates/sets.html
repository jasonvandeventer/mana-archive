{% extends "base.html" %}

{% block content %}
<h1>Sets</h1>

<div class="set-dashboard-grid">
  {% for s in sets %}
    <a href="/sets/{{ s.set_code }}" class="set-dashboard-card">
      <div class="set-code">{{ s.set_code.upper() }}</div>
      <div class="set-name">{{ s.set_name }}</div>

      <div class="set-progress-meta">
        {{ s.owned_cards }} / {{ s.total_cards }} owned —
        {{ s.completion_pct }}%
      </div>

      <div class="progress-bar">
        <div class="progress-fill" style="width: {{ s.completion_pct }}%;"></div>
      </div>

      <div class="card-meta">
        Missing: {{ s.missing_count }}
      </div>
    </a>
  {% endfor %}
</div>
{% endblock %}
