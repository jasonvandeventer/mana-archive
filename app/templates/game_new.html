{% extends "base.html" %}
{% block content %}
  <section class="panel page-hero compact-hero">
    <div>
      <div class="eyebrow">Play</div>
      <h2 class="panel-title">New Game</h2>
    </div>
  </section>
  <section class="panel">
    <form method="post" action="/games" id="game-new-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="player_count" id="player_count_hidden" value="4">
      <div class="stack-form">
        <label>Format</label>
        <select name="format">
          <option value="">— any —</option>
          <option value="Commander" selected>Commander</option>
          <option value="Standard">Standard</option>
          <option value="Modern">Modern</option>
          <option value="Legacy">Legacy</option>
          <option value="Vintage">Vintage</option>
          <option value="Draft">Draft</option>
          <option value="Sealed">Sealed</option>
        </select>
        <label>Starting Life Total</label>
        <select name="starting_life" id="starting_life">
          <option value="40" selected>40 (Commander)</option>
          <option value="20">20 (Standard/Modern)</option>
          <option value="30">30 (Brawl)</option>
        </select>
        <label>Number of Players</label>
        <div class="player-count-row">
          {% for n in [2, 3, 4, 5, 6, 7, 8] %}
            <button type="button"
                    class="player-count-btn{% if n == 4 %} active{% endif %}"
                    onclick="setPlayerCount({{ n }}, event)">{{ n }}</button>
          {% endfor %}
        </div>
      </div>
      <div id="seat-rows" style="margin-top:1.5rem"></div>
      <div style="margin-top:1.5rem">
        <button type="submit">Start Game</button>
        <a href="/games">
          <button type="button" style="margin-left:0.5rem">Cancel</button>
        </a>
      </div>
    </form>
  </section>
{% endblock %}
{% block extra_scripts %}
  <script>
const users = {{ users_json | tojson }};
const decksByUser = {{ decks_by_user_json | tojson }};
const currentUserId = {{ current_user_id }};
let playerCount = 4;

function setPlayerCount(n, event) {
  playerCount = n;
  document.getElementById('player_count_hidden').value = n;
  document.querySelectorAll('.player-count-btn').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  renderSeats();
}

function onUserChange(seatIndex, selectEl) {
  const userId = selectEl.value;
  const deckSel = document.getElementById(`deck-sel-${seatIndex}`);
  deckSel.innerHTML = '<option value="">— no deck —</option>';
  const decks = decksByUser[userId] || [];
  decks.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.name;
    deckSel.appendChild(opt);
  });
}

function renderSeats() {
  const container = document.getElementById('seat-rows');
  container.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    const isFirst = i === 0;
    const userOptions = users.map(u =>
      `<option value="${u.id}"${isFirst && u.id === currentUserId ? ' selected' : ''}>${u.name}</option>`
    ).join('');

    const div = document.createElement('div');
    div.className = 'seat-row';
    div.innerHTML = `
      <div class="seat-row-label">Seat ${i + 1}</div>
      <div class="seat-row-fields">
        <input type="text" name="player_names" placeholder="Player name" id="name-${i}" style="width:140px">
        <select name="user_ids" id="user-sel-${i}" onchange="onUserChange(${i}, this)" style="min-width:160px">
          <option value="">— no user —</option>
          ${userOptions}
        </select>
        <select name="deck_ids" id="deck-sel-${i}" style="min-width:180px">
          <option value="">— no deck —</option>
        </select>
      </div>
    `;
    container.appendChild(div);

    // Pre-populate current user's decks for seat 0
    if (isFirst) {
      const userSel = document.getElementById(`user-sel-${i}`);
      onUserChange(i, userSel);
    }

    // Auto-fill name from user selection
    document.getElementById(`user-sel-${i}`).addEventListener('change', function() {
      const nameInput = document.getElementById(`name-${i}`);
      const selected = users.find(u => String(u.id) === this.value);
      if (selected && !nameInput.value) {
        nameInput.value = selected.name;
      }
      onUserChange(i, this);
    });
  }
  // Pre-fill name for seat 0 from current user
  const firstNameInput = document.getElementById('name-0');
  const currentUserObj = users.find(u => u.id === currentUserId);
  if (firstNameInput && currentUserObj && !firstNameInput.value) {
    firstNameInput.value = currentUserObj.name;
  }
}

renderSeats();
  </script>
{% endblock %}
