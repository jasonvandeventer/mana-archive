{% extends "base.html" %}
{% block content %}
  <section>
    <h2>Decks</h2>
    <form action="/decks/create" method="post" class="deck-create-form">
      <input type="text" name="name" placeholder="Deck Name" required>
      <select name="format_name">
        <option value="Commander" selected>Commander</option>
        <option value="Standard">Standard</option>
        <option value="Pioneer">Pioneer</option>
        <option value="Modern">Modern</option>
        <option value="Legacy">Legacy</option>
        <option value="Vintage">Vintage</option>
        <option value="Cube">Cube</option>
      </select>
      <textarea name="notes" placeholder="Notes (optional)"></textarea>
      <button type="submit">Create Deck</button>
    </form>
  </section>
  <section>
    {% if decks %}
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Format</th>
            <th>Cards</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for deck in decks %}
            <tr>
              <td>{{ deck.id }}</td>
              <td>{{ deck.name }}</td>
              <td>{{ deck.format or '-' }}</td>
              <td>{{ deck.card_count or 0 }}</td>
              <td>
                <form action="/decks/{{ deck.id }}" method="get" style="display:inline;">
                  <button type="submit">Open</button>
                </form>
                <form action="/decks/{{ deck.id }}/delete"
                      method="post"
                      style="display:inline;
                             margin-left: 0.5rem">
                  <button type="submit"
                          onclick="return confirm('Delete this deck? Cards in this deck will be removed.');">
                    Delete
                  </button>
                </form>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <p>No decks yet.</p>
    {% endif %}
  </section>
{% endblock %}
