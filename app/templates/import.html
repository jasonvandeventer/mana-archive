{% extends "base.html" %}
{% block content %}
  <section>
    <h2>Import Scanner CSV</h2>
    <form action="/import/preview" method="post" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="file" name="file" accept=".csv" required>
      <button type="submit">Preview Import</button>
    </form>
  </section>
  <section class="panel">
    <h2>Add Card by Name</h2>
    <form action="/import/manual/search" method="post" class="filter-row">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="text"
             name="name"
             placeholder="Search Scryfall by card name"
             required>
      <button type="submit">Search</button>
    </form>
  </section>
  <section>
    <h2>Manual Import</h2>
    <form action="/import/manual/preview" method="post" class="stack-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label>Scryfall ID</label>
      <input type="text" name="scryfall_id">
      <label>Set Code</label>
      <input type="text" name="set_code">
      <label>Collector Number</label>
      <input type="text" name="collector_number">
      <label>Finish</label>
      <select name="finish">
        <option value="normal">Normal</option>
        <option value="foil">Foil</option>
        <option value="etched">Etched</option>
      </select>
      <label>Quantity</label>
      <input type="number" name="quantity" value="1" min="1">
      <button type="submit">Preview Manual Import</button>
    </form>
  </section>
{% endblock %}
